name: 安卓构建与发布

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 发布 tag
        required: true
        default: v0.0.1
        type: string

permissions:
  contents: write

jobs:
  build-release:
    name: 下载依赖、测试、构建并发布
    runs-on: ubuntu-latest

    steps:
      - name: 拉取源码
        uses: actions/checkout@v6

      - name: 配置 JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: 配置 Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.2.1

      - name: 安装下载工具
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: 下载 frplib latest 多架构 AAR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash ci/download-frplib.sh

      - name: 验收 frplib AAR
        run: bash ci/validate-frplib.sh

      - name: 准备 Release 签名文件
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "${ANDROID_KEYSTORE_BASE64}" ]; then
            echo "未配置 Release 签名，继续构建 unsigned release APK"
            exit 0
          fi
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "${RUNNER_TEMP}/release.keystore"
          echo "ANDROID_KEYSTORE_FILE=${RUNNER_TEMP}/release.keystore" >> "${GITHUB_ENV}"

      - name: 先构建 Debug 多架构 APK
        run: >
          gradle
          :app:assembleUniversalDebug
          :app:assembleArm64V8aDebug
          :app:assembleArmeabiV7aDebug
          :app:assembleX86_64Debug

      - name: 运行单元测试
        run: >
          gradle
          :core-frp:testDebugUnitTest
          :core-data:testDebugUnitTest
          :core-runtime:testDebugUnitTest
          :core-ui:testDebugUnitTest
          :feature-dashboard:testDebugUnitTest
          :feature-profiles:testDebugUnitTest
          :feature-editor:testDebugUnitTest
          :feature-logs:testDebugUnitTest
          :feature-settings:testDebugUnitTest
          :app:testUniversalDebugUnitTest
          :app:testArm64V8aDebugUnitTest
          :app:testArmeabiV7aDebugUnitTest
          :app:testX86_64DebugUnitTest

      - name: 运行 Android Lint
        run: >
          gradle
          :app:lintUniversalDebug
          :app:lintArm64V8aDebug
          :app:lintArmeabiV7aDebug
          :app:lintX86_64Debug

      - name: 构建 Release 多架构 APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: >
          gradle
          :app:assembleUniversalRelease
          :app:assembleArm64V8aRelease
          :app:assembleArmeabiV7aRelease
          :app:assembleX86_64Release

      - name: 整理 APK 文件名
        run: bash ci/collect-apks.sh

      - name: 上传 Debug 构建产物
        uses: actions/upload-artifact@v7
        with:
          name: frp-android-debug
          path: artifacts/debug/*.apk
          if-no-files-found: error

      - name: 上传 Release 构建产物
        uses: actions/upload-artifact@v7
        with:
          name: frp-android-release
          path: artifacts/release/*.apk
          if-no-files-found: error

      - name: 发布 GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/debug/*.apk
            artifacts/release/*.apk
